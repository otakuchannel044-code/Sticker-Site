<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticker Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      padding: 20px;
      background: #ff6f61;
      color: white;
      margin: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .sticker {
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .sticker:hover {
      transform: scale(1.1);
    }

    .sticker img {
      width: 80px;
      height: 80px;
    }

    .sticker p {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>✨ Sticker Gallery ✨</h1>

  <div class="gallery">
    <div class="sticker">
      <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png" alt="Smile">
      <p>Smile</p>
    </div>

    <div class="sticker">
      <img src="https://cdn-icons-png.flaticon.com/512/742/742774.png" alt="Love">
      <p>Love</p>
    </div>

    <div class="sticker">
      <img src="https://cdn-icons-png.flaticon.com/512/742/742762.png" alt="Cool">
      <p>Cool</p>
    </div>

    <div class="sticker">
      <img src="https://cdn-icons-png.flaticon.com/512/742/742761.png" alt="Angry">
      <p>Angry</p>
    </div>

    <div class="sticker">
      <img src="https://cdn-icons-png.flaticon.com/512/742/742757.png" alt="Surprised">
      <p>Surprised</p>
    </div>

    <div class="sticker">
      <img src="https://cdn-icons-png.flaticon.com/512/742/742758.png" alt="Sad">
      <p>Sad</p>
    </div>
  </div>

</body>
</html>
